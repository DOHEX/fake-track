name: Daily Campus Run

on:
  schedule:
    # 晨跑 22:05 UTC = 06:05 China time (UTC+8).
    - cron: "5 22 * * *"
    # 普跑 06:00 UTC = 14:00 China time (UTC+8).
    - cron: "00 6 * * *"
  workflow_dispatch:

concurrency:
  group: daily-campus-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Start daily run
        env:
          FAKE_TRACK_KEY: ${{ secrets.FAKE_TRACK_KEY }}
          FAKE_TRACK_PHONE: ${{ secrets.FAKE_TRACK_PHONE }}
          FAKE_TRACK_PASSWORD: ${{ secrets.FAKE_TRACK_PASSWORD }}
        run: uv run fake-track run